    body{

      color:white;
    }

    /* ================= HEADER ================= */

    .topbar{
      background:#ffffff;
      padding:10px;
      display:flex;
      align-items:center;
      gap:10px;
      position:sticky;
      top:0;
      z-index:100;
    }

    .menu-btn{
      font-size:22px;
      color:#444;
      cursor:pointer;
    }

    .search-box{
      flex:1;
    }

    .search-box a{
      text-decoration:none;
    }

    .search-box input{
      width:100%;
      padding:10px;
      border:none;
      border-radius:5px;
      background:#f1f1f1;
      cursor:pointer;
    }

    .icon{
      font-size:20px;
      color:#555;
      cursor:pointer;
    }

    /* ================= CONTENT ================= */

    .container{
      padding:10px;
    }

    .title{
      margin-bottom:15px;
      font-size:14px;
      color:#ccc;
    }

    /* ================= MOVIE CARD ================= */

    .movie-card{
      display:flex;
      gap:10px;
      margin-bottom:15px;
      background:#1b1b1b;
      padding:8px;
      border-radius:8px;
      align-items:center;
    }

    .movie-image{
      position:relative;
      width:120px;
      height:70px;
      flex-shrink:0;
    }

    .movie-image img{
      width:100%;
      height:100%;
      object-fit:cover;
      border-radius:5px;
    }

    /* PLAY BUTTON */

    .play-btn{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      background:red;
      color:white;
      border:none;
      width:40px;
      height:40px;
      border-radius:50%;
      font-size:18px;
      cursor:pointer;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* INFO */

    .movie-info{
      flex:1;
    }

    /* JUDUL FILM */

    .judul-link{
      text-decoration:none;
      color:white;
    }

    .judul-link:hover{
      color:red;
    }

    .movie-title{
      font-size:14px;
      margin-bottom:5px;
      line-height:1.4;
    }

    .movie-date{
      font-size:12px;
      color:#999;
    }

    .more{
      font-size:22px;
      color:#888;
      cursor:pointer;
    }

    /* FLOAT BUTTON */

    .floating-btn{
      position:fixed;
      right:15px;
      bottom:15px;
      width:55px;
      height:55px;
      background:red;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      font-size:24px;
      text-decoration:none;
      box-shadow:0 0 10px rgba(0,0,0,0.5);
